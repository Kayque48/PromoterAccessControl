<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ponto - Controle de Promotores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex min-vh-100">
        <aside class="sidebar bg-white border-end">
            <div class="p-4">
                <h4 class="mb-3">Controle Promotores</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="registro-ponto.html"><i class="bi bi-clock-history me-2"></i>Controle de Ponto</a></li>
                    <li class="nav-item"><a class="nav-link" href="promotores.html"><i class="bi bi-people me-2"></i>Promotores</a></li>
                    <li class="nav-item"><a class="nav-link" href="relatorios.html"><i class="bi bi-bar-chart-line me-2"></i>Histórico</a></li>
                    <li class="nav-item"><a class="nav-link" href="exportar.html"><i class="bi bi-download me-2"></i>Exportar</a></li>
                    <li class="nav-item"><a class="nav-link" href="empresas.html"><i class="bi bi-building me-2"></i>Empresas</a></li>
                </ul>
            </div>
            <div class="p-4">
                <button class="btn btn-outline-secondary w-100" id="btnLogout">Sair</button>
            </div>
        </aside>

        <main class="flex-fill bg-light p-4">
            <header class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h2 class="mb-1"><i class="bi bi-clock-history me-2 text-primary"></i>Registro de Ponto</h2>
                    <p class="text-muted mb-0">Registre entrada e saída rapidamente</p>
                </div>
                <div>
                    <span class="badge-soft me-2">Ponto</span>
                    <button class="btn btn-outline-primary" id="btnHistorico">Ver histórico</button>
                </div>
            </header>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Registrar Entrada</h5>
                            <div class="row g-3 align-items-end">
                                <div class="col-md-8">
                                    <label for="promotor" class="form-label">Selecione um promotor</label>
                                    <select class="form-select" id="promotor">
                                        <option value="">Selecione...</option>
                                    </select>
                                </div>
                                <div class="col-md-4 d-grid">
                                    <button class="btn btn-primary" id="btnEntrada">Registrar Entrada</button>
                                </div>
                            </div>
                            <div id="mensagem" class="alert d-none mt-3"></div>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Promotores em atendimento</h5>
                            <div id="listaRegistrosAbertos"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>    <script src="js/ui.js"></script>    <script src="js/registro-ponto.js"></script>
</body>
</html>
