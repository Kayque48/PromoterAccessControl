<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Promotores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="d-flex align-items-center justify-content-center vh-100">
        <div class="card shadow-lg" style="width:380px; border-radius: 16px;">
            <div class="card-body p-4">
                <div class="text-center mb-3">
                    <div class="badge-pill-soft mb-2">Controle Promotores</div>
                    <h3 class="h5 mb-0">Acesse sua conta</h3>
                    <p class="text-muted small">Gerencie promotores, ponto e relatórios</p>
                </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="login" class="form-label">Usuário</label>
                        <input type="text" class="form-control" id="login" placeholder="ex: admin" required>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" placeholder="••••••" required>
                    </div>
                    <div id="erro" class="alert alert-danger d-none"></div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
