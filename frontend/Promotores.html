<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotores - Controle de Promotores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex min-vh-100">
        <aside class="sidebar bg-white border-end">
            <div class="p-4">
                <h4 class="mb-3">Controle Promotores</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="registro-ponto.html"><i class="bi bi-clock-history me-2"></i>Controle de Ponto</a></li>
                    <li class="nav-item"><a class="nav-link active" href="promotores.html"><i class="bi bi-people me-2"></i>Promotores</a></li>
                    <li class="nav-item"><a class="nav-link" href="relatorios.html"><i class="bi bi-bar-chart-line me-2"></i>Histórico</a></li>
                    <li class="nav-item"><a class="nav-link" href="exportar.html"><i class="bi bi-download me-2"></i>Exportar</a></li>
                    <li class="nav-item"><a class="nav-link" href="empresas.html"><i class="bi bi-building me-2"></i>Empresas</a></li>
                </ul>
            </div>
            <div class="p-4">
                <button class="btn btn-outline-secondary w-100" id="btnLogout">Sair</button>
            </div>
        </aside>

        <main role="main" class="flex-fill bg-light p-4">
            <header class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h2 class="mb-1"><i class="bi bi-people me-2 text-primary"></i>Gerenciar Promotores</h2>
                    <p class="text-muted mb-0">Cadastro, edição e status</p>
                </div>
                <div>
                    <span class="badge-soft me-2">Total de promotores</span>
                    <button class="btn btn-outline-primary" id="btnAtivos">Ativos</button>
                </div>
            </header>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0">Promotores</h3>
                <button class="btn btn-primary" id="btnNovoPromotor" data-bs-toggle="modal" data-bs-target="#modalPromotor" aria-label="Abrir modal de novo promotor">Novo Promotor</button>
            </div>

            <div class="row" id="listaPromotores"></div>

            <div class="modal fade" id="modalPromotor" tabindex="-1" aria-labelledby="modalPromotorLabel" aria-hidden="true">
                <div class="modal-dialog modal-xl">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="modalPromotorLabel">Novo Promotor</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="formPromotor">
                                <input type="hidden" id="promotorId">
                                <div class="mb-3">
                                    <label for="nome" class="form-label">Nome completo</label>
                                    <input type="text" class="form-control" id="nome" required>
                                </div>
                                <div class="mb-3">
                                    <label for="empresa" class="form-label">Empresa</label>
                                    <select class="form-select" id="empresa" required>
                                        <option value="">Selecione...</option>
                                    </select>
                                </div>
                                <div class="row g-2">
                                    <div class="col-md-3">
                                        <label for="cpf" class="form-label">CPF</label>
                                        <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="categoria" class="form-label">Categoria</label>
                                        <select class="form-select" id="categoria" required>
                                            <option value="Promotor">Promotor</option>
                                            <option value="Promotor Exclusivo">Promotor Exclusivo</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="cep" class="form-label">CEP</label>
                                        <div class="input-group">
                                            <input type="text" class="form-control" id="cep" placeholder="00000-000" maxlength="9" />
                                            <button type="button" class="btn btn-outline-primary" id="btnBuscarCep">Buscar</button>
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="logradouro" class="form-label">Logradouro</label>
                                        <input type="text" class="form-control" id="logradouro" placeholder="Rua/Avenida" readonly>
                                    </div>
                                </div>
                                <div class="row g-2 mb-3">
                                    <div class="col-md-6">
                                        <label for="numero" class="form-label">Número</label>
                                        <input type="text" class="form-control" id="numero" placeholder="Número da residência">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="complemento" class="form-label">Complemento</label>
                                        <input type="text" class="form-control" id="complemento" placeholder="Apto, bloco, etc.">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Dias permitidos</label>
                                    <div class="d-flex flex-wrap gap-2">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="Monday" id="diaSegunda" name="diasSemana" aria-label="Dia Segunda">
                                            <label class="form-check-label" for="diaSegunda">Segunda</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="Tuesday" id="diaTerca" name="diasSemana">
                                            <label class="form-check-label" for="diaTerca">Terça</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="Wednesday" id="diaQuarta" name="diasSemana">
                                            <label class="form-check-label" for="diaQuarta">Quarta</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="Thursday" id="diaQuinta" name="diasSemana">
                                            <label class="form-check-label" for="diaQuinta">Quinta</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="Friday" id="diaSexta" name="diasSemana">
                                            <label class="form-check-label" for="diaSexta">Sexta</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="Saturday" id="diaSabado" name="diasSemana">
                                            <label class="form-check-label" for="diaSabado">Sábado</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="Sunday" id="diaDomingo" name="diasSemana">
                                            <label class="form-check-label" for="diaDomingo">Domingo</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="telefone" class="form-label">Telefone</label>
                                    <input type="text" class="form-control" id="telefone">
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">E-mail</label>
                                    <input type="email" class="form-control" id="email">
                                </div>
                                <div id="mensagem" class="alert d-none"></div>
                                <div class="d-flex justify-content-end gap-2">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                    <button type="submit" class="btn btn-primary" id="btnSalvar">Cadastrar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>    <script src="js/ui.js"></script>    <script src="js/promotores.js"></script>
</body>
</html>
