<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Controle de Promotores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex min-vh-100">
        <aside class="sidebar bg-white border-end">
            <div class="p-4">
                <h4 class="mb-3">Controle Promotores</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="registro-ponto.html"><i class="bi bi-clock-history me-2"></i>Controle de Ponto</a></li>
                    <li class="nav-item"><a class="nav-link" href="promotores.html"><i class="bi bi-people me-2"></i>Promotores</a></li>
                    <li class="nav-item"><a class="nav-link active" href="relatorios.html"><i class="bi bi-bar-chart-line me-2"></i>Histórico</a></li>
                    <li class="nav-item"><a class="nav-link" href="exportar.html"><i class="bi bi-download me-2"></i>Exportar</a></li>
                    <li class="nav-item"><a class="nav-link" href="empresas.html"><i class="bi bi-building me-2"></i>Empresas</a></li>
                </ul>
            </div>
            <div class="p-4">
                <button class="btn btn-outline-secondary w-100" id="btnLogout">Sair</button>
            </div>
        </aside>

        <main class="flex-fill bg-light p-4">
            <header class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h2 class="mb-1"><i class="bi bi-bar-chart-line me-2 text-primary"></i>Relatórios</h2>
                    <p class="text-muted mb-0">Análise por período e empresa</p>
                </div>
                <div>
                    <span class="badge-soft me-2">Histórico</span>
                    <button class="btn btn-outline-primary" id="btnGerar">Atualizar</button>
                </div>
            </header>

                <div class="card mb-3">
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-5">
                            <label for="busca" class="form-label">Buscar por nome ou empresa</label>
                            <input type="text" id="busca" class="form-control" placeholder="Digite nome ou empresa...">
                        </div>
                        <div class="col-md-2">
                            <label for="dataInicio" class="form-label">Data Início</label>
                            <input type="date" class="form-control" id="dataInicio">
                        </div>
                        <div class="col-md-2">
                            <label for="dataFim" class="form-label">Data Fim</label>
                            <input type="date" class="form-control" id="dataFim">
                        </div>
                        <div class="col-md-2">
                            <label for="empresaFiltro" class="form-label">Empresa</label>
                            <select class="form-select" id="empresaFiltro">
                                <option value="">Todas</option>
                            </select>
                        </div>
                        <div class="col-md-1">
                            <button class="btn btn-primary w-100" id="btnGerar">Filtrar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-3 d-none" id="resultadoCard">
                <div class="card-body">
                    <h5 class="card-title">Histórico de Registros</h5>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <canvas id="graficoRelatorio" height="160"></canvas>
                        </div>
                        <div class="col-md-6">
                            <p id="totalRegistrosTxt" class="mb-1">Registros: 0</p>
                            <p id="registrosFiltradosTxt" class="mb-0">Filtrados: 0</p>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover" id="tabelaHistorico">
                            <thead class="table-light">
                                <tr>
                                    <th><i class="bi bi-person-fill me-1"></i>Promotor</th>
                                    <th><i class="bi bi-building me-1"></i>Empresa</th>
                                    <th><i class="bi bi-calendar-event me-1"></i>Data</th>
                                    <th><i class="bi bi-calendar-week me-1"></i>Dia</th>
                                    <th><i class="bi bi-arrow-right-circle me-1"></i>Entrada</th>
                                    <th><i class="bi bi-arrow-left-circle me-1"></i>Saída</th>
                                    <th><i class="bi bi-clock me-1"></i>Duração</th>
                                    <th><i class="bi bi-check2-circle me-1"></i>Dia correto?</th>
                                    <th><i class="bi bi-shield-lock me-1"></i>Dias permitidos</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyHistorico"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/relatorios.js"></script>
</body>
</html>
