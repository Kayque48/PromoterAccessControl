<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresas - Controle de Promotores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex min-vh-100">
        <aside class="sidebar bg-white border-end">
            <div class="p-4">
                <h4 class="mb-3">Controle Promotores</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="registro-ponto.html"><i class="bi bi-clock-history me-2"></i>Controle de Ponto</a></li>
                    <li class="nav-item"><a class="nav-link" href="promotores.html"><i class="bi bi-people me-2"></i>Promotores</a></li>
                    <li class="nav-item"><a class="nav-link" href="relatorios.html"><i class="bi bi-bar-chart-line me-2"></i>Histórico</a></li>
                    <li class="nav-item"><a class="nav-link" href="exportar.html"><i class="bi bi-download me-2"></i>Exportar</a></li>
                    <li class="nav-item"><a class="nav-link active" href="empresas.html"><i class="bi bi-building me-2"></i>Empresas</a></li>
                </ul>
            </div>
            <div class="p-4">
                <button class="btn btn-outline-secondary w-100" id="btnLogout">Sair</button>
            </div>
        </aside>

        <main role="main" class="flex-fill bg-light p-4">
            <header class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h2 class="mb-1"><i class="bi bi-building me-2 text-primary"></i>Empresas</h2>
                    <p class="text-muted mb-0">Cadastro e atualização de empresas (somente gestores)</p>
                </div>
                <div>
                    <span class="badge-soft me-2">Gestor</span>
                </div>
            </header>

            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">Nova Empresa</h5>
                    <form id="formEmpresa">
                        <input type="hidden" id="empresaId" value="">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label for="cnpj" class="form-label">CNPJ</label>
                                <input type="text" class="form-control" id="cnpj" required>
                            </div>
                            <div class="col-md-4">
                                <label for="razaoSocial" class="form-label">Razão Social</label>
                                <input type="text" class="form-control" id="razaoSocial" required>
                            </div>
                            <div class="col-md-4">
                                <label for="nomeFantasia" class="form-label">Nome Fantasia</label>
                                <input type="text" class="form-control" id="nomeFantasia">
                            </div>
                            <div class="col-md-4">
                                <label for="telefoneEmpresa" class="form-label">Telefone</label>
                                <input type="text" class="form-control" id="telefoneEmpresa" placeholder="(XX) XXXXX-XXXX">
                            </div>
                            <div class="col-md-4">
                                <label for="emailEmpresa" class="form-label">Email Corporativo</label>
                                <input type="email" class="form-control" id="emailEmpresa" placeholder="nome@empresa.com">
                            </div>
                            <div class="col-md-3">
                                <label for="cepEmpresa" class="form-label">CEP</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="cepEmpresa" placeholder="00000-000" maxlength="9" />
                                    <button type="button" class="btn btn-outline-primary" id="btnBuscarCepEmpresa">Buscar</button>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label for="logradouroEmpresa" class="form-label">Logradouro</label>
                                <input type="text" class="form-control" id="logradouroEmpresa" placeholder="Rua/Avenida" readonly>
                            </div>
                            <div class="col-md-2">
                                <label for="numeroEmpresa" class="form-label">Número</label>
                                <input type="text" class="form-control" id="numeroEmpresa" placeholder="Número">
                            </div>
                            <div class="col-md-4">
                                <label for="complementoEmpresa" class="form-label">Complemento</label>
                                <input type="text" class="form-control" id="complementoEmpresa" placeholder="Apto, bloco, etc.">
                            </div>
                        </div>
                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary" id="btnSalvarEmpresa" aria-label="Salvar empresa">Salvar</button>
                            <button type="button" class="btn btn-secondary" id="btnCancelarEmpresa" aria-label="Cancelar cadastro de empresa">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Lista de Empresas</h5>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <input type="text" id="filtroEmpresa" class="form-control" placeholder="Buscar empresa por nome...">
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover" id="tabelaEmpresas">
                            <thead class="table-light">
                                <tr>
                                    <th>CNPJ</th>
                                    <th>Razão Social</th>
                                    <th>Nome Fantasia</th>
                                    <th>Telefone</th>
                                    <th>Email</th>
                                    <th>Endereço</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyEmpresas"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/Empresas.js"></script>
</body>
</html>
